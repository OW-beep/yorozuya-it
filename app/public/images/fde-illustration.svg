<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="340" fill="#F6F1E4"/>
  <!-- 本社(奥・小さめ) -->
  <rect x="440" y="200" width="90" height="70" fill="#5C6B78" opacity="0.3"/>
  <rect x="455" y="215" width="15" height="15" fill="#F6F1E4"/>
  <rect x="480" y="215" width="15" height="15" fill="#F6F1E4"/>
  <rect x="505" y="215" width="15" height="15" fill="#F6F1E4"/>
  <text x="485" y="290" font-family="sans-serif" font-size="11" fill="#5C6B78" text-anchor="middle">本社</text>

  <!-- 破線の道 -->
  <line x1="470" y1="200" x2="220" y2="120" stroke="#D9A441" stroke-width="2" stroke-dasharray="6,6"/>

  <!-- 顧客企業(手前・大きめ) -->
  <rect x="90" y="90" width="150" height="120" fill="#1B3550"/>
  <rect x="110" y="115" width="25" height="25" fill="#F6F1E4"/>
  <rect x="145" y="115" width="25" height="25" fill="#F6F1E4"/>
  <rect x="180" y="115" width="25" height="25" fill="#F6F1E4"/>
  <rect x="110" y="150" width="25" height="25" fill="#F6F1E4"/>
  <rect x="145" y="150" width="25" height="25" fill="#D9A441"/>
  <rect x="180" y="150" width="25" height="25" fill="#F6F1E4"/>
  <text x="165" y="230" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle" font-weight="bold">顧客企業(現場)</text>

  <!-- エンジニアの人型アイコン(現場側に立つ) -->
  <circle cx="165" cy="175" r="10" fill="#D9A441"/>

  <!-- 前線マーク -->
  <circle cx="330" cy="150" r="22" fill="#D9A441"/>
  <text x="330" y="156" font-family="sans-serif" font-size="14" fill="#1B3550" text-anchor="middle" font-weight="bold">FDE</text>
</svg>

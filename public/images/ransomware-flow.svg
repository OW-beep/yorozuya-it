<svg viewBox="0 0 700 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="340" fill="#F6F1E4"/>
  <text x="350" y="32" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1B3550" text-anchor="middle">ランサムウェア感染の流れと、備えの分かれ道</text>

  <rect x="30" y="60" width="140" height="70" rx="8" fill="#1B3550"/>
  <text x="100" y="92" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">①不審な添付や</text>
  <text x="100" y="110" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">脆弱性から感染</text>

  <path d="M172,95 h50" stroke="#5C6B78" stroke-width="3" marker-end="url(#arrow3)"/>

  <rect x="225" y="60" width="140" height="70" rx="8" fill="#1B3550"/>
  <text x="295" y="92" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">②ファイルが</text>
  <text x="295" y="110" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">勝手に暗号化</text>

  <path d="M367,95 h50" stroke="#5C6B78" stroke-width="3" marker-end="url(#arrow3)"/>

  <rect x="420" y="60" width="140" height="70" rx="8" fill="#B23A3A"/>
  <text x="490" y="92" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">③身代金を</text>
  <text x="490" y="110" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">要求される</text>

  <line x1="490" y1="130" x2="490" y2="160" stroke="#5C6B78" stroke-width="2"/>
  <line x1="250" y1="160" x2="490" y2="160" stroke="#5C6B78" stroke-width="2"/>
  <line x1="250" y1="160" x2="250" y2="180" stroke="#5C6B78" stroke-width="2"/>
  <line x1="490" y1="160" x2="490" y2="180" stroke="#5C6B78" stroke-width="2"/>

  <rect x="120" y="180" width="260" height="110" rx="8" fill="#D9A441"/>
  <text x="250" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1B3550" text-anchor="middle">バックアップがある場合</text>
  <text x="250" y="235" font-family="sans-serif" font-size="12" fill="#1B3550" text-anchor="middle">身代金を払わずに</text>
  <text x="250" y="253" font-family="sans-serif" font-size="12" fill="#1B3550" text-anchor="middle">バックアップから</text>
  <text x="250" y="271" font-family="sans-serif" font-size="12" fill="#1B3550" text-anchor="middle">データを復元できる</text>

  <rect x="400" y="180" width="260" height="110" rx="8" fill="#EFE7D3" stroke="#B23A3A" stroke-width="2"/>
  <text x="530" y="210" font-family="sans-serif" font-size="14" font-weight="bold" fill="#B23A3A" text-anchor="middle">バックアップがない場合</text>
  <text x="530" y="235" font-family="sans-serif" font-size="12" fill="#1B3550" text-anchor="middle">支払っても復元の</text>
  <text x="530" y="253" font-family="sans-serif" font-size="12" fill="#1B3550" text-anchor="middle">保証はなく、</text>
  <text x="530" y="271" font-family="sans-serif" font-size="12" fill="#1B3550" text-anchor="middle">選択肢が限られる</text>

  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5C6B78" />
    </marker>
  </defs>
</svg>

<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="380" fill="#F6F1E4"/>
  <text x="300" y="35" font-family="sans-serif" font-size="16" fill="#1B3550" text-anchor="middle" font-weight="bold">FDE関連の求人数(日本国内・分析値)</text>

  <!-- 軸 -->
  <line x1="80" y1="300" x2="520" y2="300" stroke="#1B3550" stroke-width="1.5"/>
  <line x1="80" y1="80" x2="80" y2="300" stroke="#1B3550" stroke-width="1.5"/>

  <!-- 2025年 棒 -->
  <rect x="180" y="278" width="90" height="22" fill="#5C6B78"/>
  <text x="225" y="270" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle">643件</text>
  <text x="225" y="322" font-family="sans-serif" font-size="12" fill="#5C6B78" text-anchor="middle">2025年4月</text>

  <!-- 2026年 棒(大幅増) -->
  <rect x="350" y="100" width="90" height="200" fill="#D9A441"/>
  <text x="395" y="92" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle" font-weight="bold">5,330件</text>
  <text x="395" y="322" font-family="sans-serif" font-size="12" fill="#5C6B78" text-anchor="middle">2026年4月</text>

  <text x="300" y="355" font-family="sans-serif" font-size="12" fill="#5C6B78" text-anchor="middle">前年同月比 約729%増(分析データに基づく)</text>
</svg>

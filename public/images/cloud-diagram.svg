<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="320" fill="#F6F1E4"/>
  <text x="350" y="30" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1B3550" text-anchor="middle">クラウドは「みんなでつながる、遠くのコンピューター」</text>

  <g>
    <rect x="40" y="60" width="90" height="60" rx="8" fill="#1B3550"/>
    <text x="85" y="95" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">スマホ</text>

    <rect x="40" y="230" width="90" height="60" rx="8" fill="#1B3550"/>
    <text x="85" y="265" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">パソコン</text>

    <rect x="40" y="145" width="90" height="60" rx="8" fill="#1B3550"/>
    <text x="85" y="180" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">タブレット</text>
  </g>

  <path d="M132,90 q120,40 220,80" stroke="#5C6B78" stroke-width="2" fill="none" marker-end="url(#arrow5)"/>
  <path d="M132,175 h220" stroke="#5C6B78" stroke-width="2" fill="none" marker-end="url(#arrow5)"/>
  <path d="M132,260 q120,-40 220,-80" stroke="#5C6B78" stroke-width="2" fill="none" marker-end="url(#arrow5)"/>

  <ellipse cx="500" cy="175" rx="150" ry="90" fill="#D9A441" opacity="0.25"/>
  <rect x="420" y="130" width="160" height="90" rx="10" fill="#D9A441"/>
  <text x="500" y="165" font-family="sans-serif" font-size="14" font-weight="bold" fill="#1B3550" text-anchor="middle">クラウド</text>
  <text x="500" y="185" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">(会社のデータセンター</text>
  <text x="500" y="200" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">にある巨大なコンピューター)</text>

  <text x="350" y="290" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle">どの端末からログインしても、同じデータにアクセスできる</text>

  <defs>
    <marker id="arrow5" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5C6B78" />
    </marker>
  </defs>
</svg>

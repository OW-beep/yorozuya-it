<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="340" fill="#F6F1E4"/>
  <text x="300" y="35" font-family="sans-serif" font-size="15" fill="#1B3550" text-anchor="middle" font-weight="bold">CPUとGPU、処理の考え方の違い</text>

  <!-- CPU側:少数の優秀な窓口 -->
  <rect x="60" y="70" width="200" height="220" fill="none" stroke="#5C6B78" stroke-width="1.5"/>
  <text x="160" y="95" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle" font-weight="bold">CPU</text>
  <rect x="100" y="130" width="55" height="55" fill="#1B3550"/>
  <rect x="165" y="130" width="55" height="55" fill="#1B3550"/>
  <text x="160" y="260" font-family="sans-serif" font-size="12" fill="#5C6B78" text-anchor="middle">少数精鋭の窓口で</text>
  <text x="160" y="278" font-family="sans-serif" font-size="12" fill="#5C6B78" text-anchor="middle">複雑な処理を順にこなす</text>

  <!-- GPU側:大量の単純な窓口 -->
  <rect x="340" y="70" width="200" height="220" fill="none" stroke="#5C6B78" stroke-width="1.5"/>
  <text x="440" y="95" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle" font-weight="bold">GPU</text>
  <g fill="#D9A441">
    <rect x="365" y="120" width="24" height="24"/>
    <rect x="395" y="120" width="24" height="24"/>
    <rect x="425" y="120" width="24" height="24"/>
    <rect x="455" y="120" width="24" height="24"/>
    <rect x="485" y="120" width="24" height="24"/>
    <rect x="365" y="150" width="24" height="24"/>
    <rect x="395" y="150" width="24" height="24"/>
    <rect x="425" y="150" width="24" height="24"/>
    <rect x="455" y="150" width="24" height="24"/>
    <rect x="485" y="150" width="24" height="24"/>
    <rect x="365" y="180" width="24" height="24"/>
    <rect x="395" y="180" width="24" height="24"/>
    <rect x="425" y="180" width="24" height="24"/>
    <rect x="455" y="180" width="24" height="24"/>
    <rect x="485" y="180" width="24" height="24"/>
  </g>
  <text x="440" y="260" font-family="sans-serif" font-size="12" fill="#5C6B78" text-anchor="middle">大量の窓口で</text>
  <text x="440" y="278" font-family="sans-serif" font-size="12" fill="#5C6B78" text-anchor="middle">単純な計算を同時にこなす</text>
</svg>

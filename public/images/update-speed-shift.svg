<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="300" fill="#F6F1E4"/>
  <text x="350" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1B3550" text-anchor="middle">「悪用されるまでの期間」が短くなっている</text>

  <text x="170" y="60" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B3550" text-anchor="middle">従来</text>
  <rect x="40" y="75" width="260" height="50" rx="8" fill="#1B3550"/>
  <text x="170" y="105" font-family="sans-serif" font-size="13" fill="#F6F1E4" text-anchor="middle">脆弱性の発見 → 悪用まで 数週間</text>
  <rect x="40" y="135" width="260" height="40" rx="8" fill="#EFE7D3" stroke="#1B3550" stroke-width="2"/>
  <text x="170" y="160" font-family="sans-serif" font-size="12" fill="#1B3550" text-anchor="middle">→ 数週間かけて慎重にテスト</text>

  <text x="530" y="60" font-family="sans-serif" font-size="13" font-weight="bold" fill="#B23A3A" text-anchor="middle">現在</text>
  <rect x="400" y="75" width="260" height="50" rx="8" fill="#B23A3A"/>
  <text x="530" y="105" font-family="sans-serif" font-size="13" fill="#F6F1E4" text-anchor="middle">脆弱性の発見 → 悪用まで 数時間</text>
  <rect x="400" y="135" width="260" height="40" rx="8" fill="#D9A441"/>
  <text x="530" y="160" font-family="sans-serif" font-size="12" fill="#1B3550" text-anchor="middle">→ 3日未満での全展開を推奨</text>

  <path d="M300,150 h90" stroke="#5C6B78" stroke-width="3" marker-end="url(#arrow6)"/>
  <text x="350" y="145" font-family="sans-serif" font-size="20" fill="#5C6B78" text-anchor="middle">変化</text>

  <text x="350" y="220" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle">対応スピードの基準自体が、根本から見直されている</text>
  <defs>
    <marker id="arrow6" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5C6B78" />
    </marker>
  </defs>
</svg>

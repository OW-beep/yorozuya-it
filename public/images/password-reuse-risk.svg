<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="380" fill="#F6F1E4"/>
  <text x="350" y="34" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1B3550" text-anchor="middle">パスワード使い回しが危険な理由</text>

  <rect x="40" y="70" width="150" height="60" rx="8" fill="#1B3550"/>
  <text x="115" y="105" font-family="sans-serif" font-size="14" fill="#F6F1E4" text-anchor="middle">サービスA</text>
  <text x="115" y="60" font-family="sans-serif" font-size="12" fill="#5C6B78" text-anchor="middle">(情報が漏洩)</text>

  <rect x="40" y="160" width="150" height="60" rx="8" fill="#EFE7D3" stroke="#1B3550" stroke-width="2"/>
  <text x="115" y="195" font-family="sans-serif" font-size="14" fill="#1B3550" text-anchor="middle">サービスB</text>

  <rect x="40" y="250" width="150" height="60" rx="8" fill="#EFE7D3" stroke="#1B3550" stroke-width="2"/>
  <text x="115" y="285" font-family="sans-serif" font-size="14" fill="#1B3550" text-anchor="middle">サービスC</text>

  <text x="260" y="105" font-family="sans-serif" font-size="12" fill="#5C6B78">同じ</text>
  <text x="260" y="120" font-family="sans-serif" font-size="12" fill="#5C6B78">パスワード</text>
  <path d="M190,100 h140" stroke="#D9A441" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#arrow2)"/>
  <path d="M190,100 q100,50 -0,90" stroke="#D9A441" stroke-width="3" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow2)"/>
  <path d="M190,100 q100,140 -0,180" stroke="#D9A441" stroke-width="3" stroke-dasharray="6 4" fill="none" marker-end="url(#arrow2)"/>

  <rect x="450" y="70" width="180" height="60" rx="8" fill="#B23A3A"/>
  <text x="540" y="105" font-family="sans-serif" font-size="13" fill="#F6F1E4" text-anchor="middle">攻撃者がAで入手した</text>
  <rect x="450" y="140" width="180" height="180" rx="8" fill="none" stroke="#B23A3A" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="540" y="165" font-family="sans-serif" font-size="13" font-weight="bold" fill="#B23A3A" text-anchor="middle">同じID・PWで</text>
  <text x="540" y="185" font-family="sans-serif" font-size="13" font-weight="bold" fill="#B23A3A" text-anchor="middle">B・Cにも</text>
  <text x="540" y="205" font-family="sans-serif" font-size="13" font-weight="bold" fill="#B23A3A" text-anchor="middle">ログインを試行</text>
  <text x="540" y="235" font-family="sans-serif" font-size="12" fill="#1B3550" text-anchor="middle">(パスワードリスト攻撃)</text>

  <line x1="340" y1="345" x2="680" y2="345" stroke="#1B3550" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="510" y="368" font-family="sans-serif" font-size="14" font-weight="bold" fill="#D9A441" text-anchor="middle">サービスごとに違うパスワードなら、被害はAだけで止まる</text>

  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#D9A441" />
    </marker>
  </defs>
</svg>

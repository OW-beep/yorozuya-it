<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="300" fill="#F6F1E4"/>
  <text x="350" y="30" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1B3550" text-anchor="middle">関数は「入力→処理→出力」の自動販売機</text>

  <rect x="30" y="90" width="150" height="100" rx="10" fill="#EFE7D3" stroke="#1B3550" stroke-width="2"/>
  <text x="105" y="125" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B3550" text-anchor="middle">引数(入力)</text>
  <text x="105" y="155" font-family="sans-serif" font-size="20" fill="#1B3550" text-anchor="middle">3, 5</text>
  <text x="105" y="175" font-family="sans-serif" font-size="11" fill="#5C6B78" text-anchor="middle">(お金・ボタン)</text>

  <path d="M182,140 h50" stroke="#5C6B78" stroke-width="3" marker-end="url(#arrow4)"/>

  <rect x="235" y="80" width="230" height="120" rx="10" fill="#1B3550"/>
  <text x="350" y="115" font-family="sans-serif" font-size="14" font-weight="bold" fill="#F6F1E4" text-anchor="middle">関数 tasu(a, b)</text>
  <text x="350" y="145" font-family="sans-serif" font-size="13" fill="#EFE7D3" text-anchor="middle">return a + b;</text>
  <text x="350" y="175" font-family="sans-serif" font-size="11" fill="#EFE7D3" text-anchor="middle">(自動販売機の内部処理)</text>

  <path d="M467,140 h50" stroke="#5C6B78" stroke-width="3" marker-end="url(#arrow4)"/>

  <rect x="520" y="90" width="150" height="100" rx="10" fill="#D9A441"/>
  <text x="595" y="125" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B3550" text-anchor="middle">戻り値(出力)</text>
  <text x="595" y="155" font-family="sans-serif" font-size="20" fill="#1B3550" text-anchor="middle">8</text>
  <text x="595" y="175" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">(出てくる飲み物)</text>

  <text x="350" y="250" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle">中身の処理を知らなくても、名前を呼び出すだけで結果を受け取れる</text>

  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5C6B78" />
    </marker>
  </defs>
</svg>

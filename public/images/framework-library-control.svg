<svg viewBox="0 0 700 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="300" fill="#F6F1E4"/>
  <text x="350" y="30" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1B3550" text-anchor="middle">「誰が主導権を持つか」で見る、制御の逆転</text>

  <rect x="40" y="60" width="290" height="210" rx="10" fill="#EFE7D3" stroke="#1B3550" stroke-width="2"/>
  <text x="185" y="90" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1B3550" text-anchor="middle">ライブラリ</text>
  <rect x="70" y="120" width="230" height="50" rx="6" fill="#1B3550"/>
  <text x="185" y="150" font-family="sans-serif" font-size="13" fill="#F6F1E4" text-anchor="middle">自分のコード</text>
  <text x="185" y="185" font-family="sans-serif" font-size="20" fill="#D9A441" text-anchor="middle">↓ 呼び出す</text>
  <rect x="70" y="200" width="230" height="50" rx="6" fill="#D9A441"/>
  <text x="185" y="230" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle">ライブラリの機能</text>

  <rect x="370" y="60" width="290" height="210" rx="10" fill="#1B3550"/>
  <text x="515" y="90" font-family="sans-serif" font-size="15" font-weight="bold" fill="#F6F1E4" text-anchor="middle">フレームワーク</text>
  <rect x="400" y="120" width="230" height="50" rx="6" fill="#D9A441"/>
  <text x="515" y="150" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle">フレームワーク本体</text>
  <text x="515" y="185" font-family="sans-serif" font-size="20" fill="#EFE7D3" text-anchor="middle">↓ 呼び出す</text>
  <rect x="400" y="200" width="230" height="50" rx="6" fill="#EFE7D3"/>
  <text x="515" y="230" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle">自分のコード(決められた場所)</text>
</svg>

<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="380" fill="#F6F1E4"/>
  <text x="350" y="34" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1B3550" text-anchor="middle">フィッシング詐欺の典型的な流れ</text>

  <rect x="30" y="70" width="140" height="80" rx="8" fill="#1B3550"/>
  <text x="100" y="105" font-family="sans-serif" font-size="14" fill="#F6F1E4" text-anchor="middle">①なりすまし</text>
  <text x="100" y="126" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">メール送信</text>

  <path d="M172,110 h56" stroke="#5C6B78" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="230" y="70" width="140" height="80" rx="8" fill="#1B3550"/>
  <text x="300" y="105" font-family="sans-serif" font-size="14" fill="#F6F1E4" text-anchor="middle">②偽サイトへ</text>
  <text x="300" y="126" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">誘導するリンク</text>

  <path d="M372,110 h56" stroke="#5C6B78" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="430" y="70" width="140" height="80" rx="8" fill="#1B3550"/>
  <text x="500" y="105" font-family="sans-serif" font-size="14" fill="#F6F1E4" text-anchor="middle">③情報入力</text>
  <text x="500" y="126" font-family="sans-serif" font-size="12" fill="#F6F1E4" text-anchor="middle">ID・パスワード等</text>

  <path d="M572,110 h56" stroke="#5C6B78" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="620" y="70" width="60" height="80" rx="8" fill="#D9A441"/>
  <text x="650" y="105" font-family="sans-serif" font-size="13" fill="#1B3550" text-anchor="middle">④盗用</text>
  <text x="650" y="122" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">被害</text>

  <line x1="30" y1="200" x2="670" y2="200" stroke="#1B3550" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="350" y="228" font-family="sans-serif" font-size="15" font-weight="bold" fill="#D9A441" text-anchor="middle">この3ヶ所で気づけば被害を防げる</text>

  <rect x="60" y="250" width="180" height="90" rx="8" fill="#EFE7D3" stroke="#1B3550" stroke-width="2"/>
  <text x="150" y="278" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B3550" text-anchor="middle">送信元アドレス</text>
  <text x="150" y="300" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">表示名でなく実際の</text>
  <text x="150" y="316" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">メールアドレスを確認</text>

  <rect x="260" y="250" width="180" height="90" rx="8" fill="#EFE7D3" stroke="#1B3550" stroke-width="2"/>
  <text x="350" y="278" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B3550" text-anchor="middle">リンク先URL</text>
  <text x="350" y="300" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">長押し/マウスオーバーで</text>
  <text x="350" y="316" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">実際の飛び先を確認</text>

  <rect x="460" y="250" width="180" height="90" rx="8" fill="#EFE7D3" stroke="#1B3550" stroke-width="2"/>
  <text x="550" y="278" font-family="sans-serif" font-size="13" font-weight="bold" fill="#1B3550" text-anchor="middle">緊急性を煽る文面</text>
  <text x="550" y="300" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">「24時間以内」等は</text>
  <text x="550" y="316" font-family="sans-serif" font-size="11" fill="#1B3550" text-anchor="middle">典型的な手口と疑う</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#5C6B78" />
    </marker>
  </defs>
</svg>
